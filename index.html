<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA World Cup 2026 – Spin the Wheel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #05101f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 28px 16px 40px;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    .header {
      text-align: center;
      margin-bottom: 18px;
    }
    .header h1 {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 900;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #b8902a, #f5d44e, #e0a830, #f5d44e, #b8902a);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }
    .header p {
      margin-top: 6px;
      font-size: 0.85rem;
      color: #7aa4d8;
    }

    /* ── Session bar ── */
    .session-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .session-status {
      font-size: 0.9rem;
      color: #7aa4d8;
      min-width: 160px;
      text-align: center;
    }
    .session-status strong { color: #f5d44e; }

    .btn-session {
      padding: 9px 26px;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn-session:hover { transform: scale(1.05); }
    .btn-start { background: #2ecc71; color: #05101f; }
    .btn-reset { background: #e74c3c; color: #fff; }

    /* ── Chosen list ── */
    .chosen-section {
      margin-bottom: 16px;
      text-align: center;
      max-width: 580px;
      width: 100%;
    }
    .chosen-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #7aa4d8;
      margin-bottom: 8px;
    }
    .chosen-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }
    .chosen-chip {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.78rem;
      color: #aaa;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }

    /* ── Wheel ── */
    .wheel-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .wheel-wrapper { position: relative; display: inline-block; }
    #wheelCanvas {
      display: block;
      filter: drop-shadow(0 0 24px rgba(200,164,60,0.25));
    }

    /* ── Spin button ── */
    #spinBtn {
      padding: 14px 64px;
      font-size: 1.2rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #c8922a, #f5d44e, #c8922a);
      color: #05101f;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(200,164,60,0.45);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    #spinBtn:hover:not(:disabled) {
      transform: scale(1.06);
      box-shadow: 0 6px 32px rgba(200,164,60,0.65);
    }
    #spinBtn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Result ── */
    #result {
      min-height: 90px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    #result .res-flag {
      font-size: 3.2rem;
      line-height: 1;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    #result .res-name {
      font-size: 1.7rem;
      font-weight: 900;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #c8922a, #f5d44e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.05s both;
    }
    #result .res-sub {
      font-size: 0.85rem;
      color: #7aa4d8;
      margin-top: 4px;
    }
    @keyframes popIn {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .complete-banner {
      margin-top: 12px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #1a3c1a, #2ecc71 200%);
      border: 1px solid #2ecc71;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
    }

    /* ── Confetti ── */
    #confettiCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>

  <header class="header">
    <h1>⚽ FIFA World Cup 2026</h1>
    <p>48 Nations &nbsp;·&nbsp; Spin &amp; Eliminate</p>
  </header>

  <div class="session-bar">
    <button class="btn-session btn-start" id="startBtn" onclick="startSession()">Start Session</button>
    <div class="session-status" id="sessionStatus">No active session</div>
    <button class="btn-session btn-reset" id="resetBtn" onclick="resetSession()" style="display:none">Reset</button>
  </div>

  <div class="chosen-section" id="chosenSection" style="display:none">
    <div class="chosen-title">Already chosen</div>
    <div class="chosen-list" id="chosenList"></div>
  </div>

  <div class="wheel-area">
    <div class="wheel-wrapper">
      <canvas id="wheelCanvas"></canvas>
    </div>
    <button id="spinBtn" onclick="spinWheel()" disabled>SPIN!</button>
    <div id="result"></div>
  </div>

  <canvas id="confettiCanvas"></canvas>

<script>
const ALL_TEAMS = [
  { name: "Algeria",        flag: "🇩🇿" },
  { name: "Argentina",      flag: "🇦🇷" },
  { name: "Australia",      flag: "🇦🇺" },
  { name: "Austria",        flag: "🇦🇹" },
  { name: "Belgium",        flag: "🇧🇪" },
  { name: "Bosnia & Herz.", flag: "🇧🇦" },
  { name: "Brazil",         flag: "🇧🇷" },
  { name: "Canada",         flag: "🇨🇦" },
  { name: "Cape Verde",     flag: "🇨🇻" },
  { name: "Colombia",       flag: "🇨🇴" },
  { name: "Croatia",        flag: "🇭🇷" },
  { name: "Curaçao",        flag: "🇨🇼" },
  { name: "Czech Republic", flag: "🇨🇿" },
  { name: "DR Congo",       flag: "🇨🇩" },
  { name: "Ecuador",        flag: "🇪🇨" },
  { name: "Egypt",          flag: "🇪🇬" },
  { name: "England",        flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
  { name: "France",         flag: "🇫🇷" },
  { name: "Germany",        flag: "🇩🇪" },
  { name: "Ghana",          flag: "🇬🇭" },
  { name: "Haiti",          flag: "🇭🇹" },
  { name: "Iran",           flag: "🇮🇷" },
  { name: "Iraq",           flag: "🇮🇶" },
  { name: "Ivory Coast",    flag: "🇨🇮" },
  { name: "Japan",          flag: "🇯🇵" },
  { name: "Jordan",         flag: "🇯🇴" },
  { name: "Mexico",         flag: "🇲🇽" },
  { name: "Morocco",        flag: "🇲🇦" },
  { name: "Netherlands",    flag: "🇳🇱" },
  { name: "New Zealand",    flag: "🇳🇿" },
  { name: "Norway",         flag: "🇳🇴" },
  { name: "Panama",         flag: "🇵🇦" },
  { name: "Paraguay",       flag: "🇵🇾" },
  { name: "Portugal",       flag: "🇵🇹" },
  { name: "Qatar",          flag: "🇶🇦" },
  { name: "Saudi Arabia",   flag: "🇸🇦" },
  { name: "Scotland",       flag: "🏴󠁧󠁢󠁳󠁣󠁴󠁿" },
  { name: "Senegal",        flag: "🇸🇳" },
  { name: "South Africa",   flag: "🇿🇦" },
  { name: "South Korea",    flag: "🇰🇷" },
  { name: "Spain",          flag: "🇪🇸" },
  { name: "Sweden",         flag: "🇸🇪" },
  { name: "Switzerland",    flag: "🇨🇭" },
  { name: "Tunisia",        flag: "🇹🇳" },
  { name: "Turkey",         flag: "🇹🇷" },
  { name: "United States",  flag: "🇺🇸" },
  { name: "Uruguay",        flag: "🇺🇾" },
  { name: "Uzbekistan",     flag: "🇺🇿" },
];

const PALETTE = [
  "#1a3c70","#173468","#1c4478","#163060",
  "#1a5c3a","#175234","#1c6440","#14482e",
  "#5c1a1a","#521517","#641c1c","#481414",
  "#3a1a5c","#321552","#421c64","#281448",
  "#1a3a5c","#153258","#1c4264","#142848",
  "#5c3a1a","#523215","#64421c","#482814",
  "#1a5c50","#155248","#1c6458","#144840",
  "#5c1a3a","#521532","#641c42","#481428",
  "#1a4c1a","#154415","#1c541c","#143814",
  "#4c1a4c","#441544","#541c54","#381438",
  "#1a1a5c","#151552","#1c1c64","#101048",
  "#5c4c1a","#524415","#64541c","#483814",
];

// ── State ─────────────────────────────────────────────────────────────────
let sessionActive   = false;
let sessionTeams    = [];
let chosenTeams     = [];
let currentRotation = 0;
let isSpinning      = false;

// ── Canvas ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('wheelCanvas');
const ctx    = canvas.getContext('2d');
let SIZE, CX, CY, RADIUS;

function resize() {
  SIZE   = Math.max(300, Math.min(window.innerWidth - 80, 560));
  canvas.width  = SIZE + 60;
  canvas.height = SIZE;
  CX     = SIZE / 2;
  CY     = SIZE / 2;
  RADIUS = SIZE / 2 - 10;
  drawWheel(currentRotation);
}

// ── Draw ──────────────────────────────────────────────────────────────────
function drawWheel(rotation) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const teams = sessionActive ? sessionTeams : ALL_TEAMS;
  const n     = teams.length;

  if (n === 0) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(CX, CY, RADIUS, 0, 2 * Math.PI);
    ctx.strokeStyle = '#c8922a';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.font = `bold ${RADIUS * 0.12}px Arial`;
    ctx.fillStyle = '#f5d44e';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🎉 All done!', CX, CY);
    ctx.restore();
    return;
  }

  const arc = (2 * Math.PI) / n;

  // Outer glow
  ctx.save();
  ctx.shadowColor = 'rgba(245,212,78,0.4)';
  ctx.shadowBlur  = 22;
  ctx.beginPath();
  ctx.arc(CX, CY, RADIUS + 3, 0, 2 * Math.PI);
  ctx.strokeStyle = '#c8922a';
  ctx.lineWidth   = 3.5;
  ctx.stroke();
  ctx.restore();

  for (let i = 0; i < n; i++) {
    const start = rotation + i * arc;
    const end   = start + arc;
    const mid   = start + arc / 2;

    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, RADIUS, start, end);
    ctx.closePath();
    ctx.fillStyle   = PALETTE[i % PALETTE.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth   = 0.8;
    ctx.stroke();

    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(mid);
    ctx.textAlign    = 'right';
    ctx.textBaseline = 'middle';

    const flagSize = Math.max(9, RADIUS * 0.045);
    ctx.font      = `${flagSize}px serif`;
    ctx.fillStyle = 'rgba(255,255,255,1)';
    ctx.fillText(teams[i].flag, RADIUS - 6, 0);

    const nameSize = Math.max(7, RADIUS * 0.037);
    ctx.font       = `bold ${nameSize}px Arial, sans-serif`;
    ctx.fillStyle  = 'rgba(255,255,255,0.92)';
    const flagW    = ctx.measureText(teams[i].flag).width + 2;
    ctx.fillText(teams[i].name, RADIUS - 6 - flagW - 4, 0);

    ctx.restore();
  }

  // Center disc
  const discR = RADIUS * 0.095;
  ctx.beginPath();
  ctx.arc(CX, CY, discR + 2, 0, 2 * Math.PI);
  ctx.fillStyle   = '#05101f';
  ctx.fill();
  ctx.strokeStyle = '#f5d44e';
  ctx.lineWidth   = 2.5;
  ctx.stroke();
  ctx.font         = `${discR * 1.4}px serif`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⚽', CX, CY);

  // Pointer arrow
  const tipX  = CX + RADIUS + 2;
  const baseX = CX + RADIUS + 34;
  ctx.save();
  ctx.shadowColor = 'rgba(245,212,78,0.85)';
  ctx.shadowBlur  = 12;
  ctx.beginPath();
  ctx.moveTo(tipX, CY);
  ctx.lineTo(baseX, CY - 16);
  ctx.lineTo(baseX, CY + 16);
  ctx.closePath();
  ctx.fillStyle = '#f5d44e';
  ctx.fill();
  ctx.restore();
}

// ── Session ───────────────────────────────────────────────────────────────
function startSession() {
  sessionActive   = true;
  sessionTeams    = [...ALL_TEAMS];
  chosenTeams     = [];
  currentRotation = 0;

  document.getElementById('startBtn').style.display       = 'none';
  document.getElementById('resetBtn').style.display       = '';
  document.getElementById('spinBtn').disabled             = false;
  document.getElementById('result').innerHTML             = '';
  document.getElementById('chosenSection').style.display  = 'none';
  document.getElementById('chosenList').innerHTML         = '';

  updateStatus();
  drawWheel(0);
}

function resetSession() {
  sessionActive   = false;
  sessionTeams    = [];
  chosenTeams     = [];
  currentRotation = 0;

  document.getElementById('startBtn').style.display       = '';
  document.getElementById('resetBtn').style.display       = 'none';
  document.getElementById('spinBtn').disabled             = true;
  document.getElementById('result').innerHTML             = '';
  document.getElementById('sessionStatus').textContent    = 'No active session';
  document.getElementById('chosenSection').style.display  = 'none';
  document.getElementById('chosenList').innerHTML         = '';

  drawWheel(0);
}

function updateStatus() {
  const remaining = sessionTeams.length;
  const total     = ALL_TEAMS.length;
  const el        = document.getElementById('sessionStatus');
  if (remaining === 0) {
    el.innerHTML = '<strong>All countries chosen! 🎉</strong>';
  } else {
    el.innerHTML = `<strong>${remaining}</strong> / ${total} remaining`;
  }
}

// ── Spin ──────────────────────────────────────────────────────────────────
function easeOut(t) { return 1 - Math.pow(1 - t, 3.5); }

function spinWheel() {
  if (isSpinning || !sessionActive || sessionTeams.length === 0) return;
  isSpinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('result').innerHTML = '';

  const totalDelta = (7 + Math.floor(Math.random() * 6)) * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const duration   = 4500 + Math.random() * 1500;
  const startRot   = currentRotation;
  let   startTime  = null;

  function step(ts) {
    if (!startTime) startTime = ts;
    const progress  = Math.min((ts - startTime) / duration, 1);
    currentRotation = startRot + totalDelta * easeOut(progress);
    drawWheel(currentRotation);
    if (progress < 1) {
      requestAnimationFrame(step);
    } else {
      isSpinning = false;
      revealAndEliminate();
    }
  }
  requestAnimationFrame(step);
}

function revealAndEliminate() {
  const n      = sessionTeams.length;
  const arc    = (2 * Math.PI) / n;
  const norm   = ((-(currentRotation % (2 * Math.PI))) + 2 * Math.PI) % (2 * Math.PI);
  const idx    = Math.floor(norm / arc) % n;
  const winner = sessionTeams[idx];

  sessionTeams.splice(idx, 1);
  chosenTeams.push(winner);

  // Add chip
  const chosenSection = document.getElementById('chosenSection');
  const chosenList    = document.getElementById('chosenList');
  chosenSection.style.display = '';
  const chip = document.createElement('span');
  chip.className   = 'chosen-chip';
  chip.textContent = `${winner.flag} ${winner.name}`;
  chosenList.appendChild(chip);

  updateStatus();

  const remaining = sessionTeams.length;
  let html = `<span class="res-flag">${winner.flag}</span>
              <span class="res-name">${winner.name}</span>
              <span class="res-sub">${remaining} ${remaining === 1 ? 'country' : 'countries'} left</span>`;

  if (remaining === 0) {
    html += `<div class="complete-banner">🎉 All 48 countries have been chosen!</div>`;
  } else {
    document.getElementById('spinBtn').disabled = false;
  }

  document.getElementById('result').innerHTML = html;
  drawWheel(currentRotation);
  launchConfetti();
}

// ── Confetti ──────────────────────────────────────────────────────────────
function launchConfetti() {
  const cc   = document.getElementById('confettiCanvas');
  cc.width   = window.innerWidth;
  cc.height  = window.innerHeight;
  const cCtx = cc.getContext('2d');
  const cols = ['#f5d44e','#c8922a','#ffffff','#4a90d9','#e74c3c','#2ecc71','#a29bfe'];

  const particles = Array.from({ length: 130 }, () => ({
    x: Math.random() * cc.width,
    y: -10 - Math.random() * 100,
    vx: (Math.random() - 0.5) * 5,
    vy: 2.5 + Math.random() * 4,
    w: 6 + Math.random() * 10,
    h: 4 + Math.random() * 5,
    rot: Math.random() * Math.PI * 2,
    vr: (Math.random() - 0.5) * 0.25,
    color: cols[Math.floor(Math.random() * cols.length)],
    alpha: 1,
  }));

  function tick() {
    cCtx.clearRect(0, 0, cc.width, cc.height);
    let alive = false;
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if (p.y > cc.height * 0.65) p.alpha -= 0.02;
      if (p.y < cc.height + 20 && p.alpha > 0) {
        alive = true;
        cCtx.save();
        cCtx.globalAlpha = Math.max(0, p.alpha);
        cCtx.translate(p.x, p.y);
        cCtx.rotate(p.rot);
        cCtx.fillStyle = p.color;
        cCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        cCtx.restore();
      }
    }
    if (alive) requestAnimationFrame(tick);
    else cCtx.clearRect(0, 0, cc.width, cc.height);
  }
  requestAnimationFrame(tick);
}

// ── Init ──────────────────────────────────────────────────────────────────
resize();
window.addEventListener('resize', resize);
</script>
</body>
</html>
